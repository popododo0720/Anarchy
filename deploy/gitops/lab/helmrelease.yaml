apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: anarchy
  namespace: anarchy-system
spec:
  interval: 5m
  chart:
    spec:
      chart: ./charts/anarchy
      sourceRef:
        kind: GitRepository
        name: anarchy
        namespace: flux-system
  values:
    image:
      repository: ghcr.io/popododo0720/anarchy-api
      tag: dev

apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: anarchy
  namespace: anarchy-system
spec:
  interval: 5m
  chart:
    spec:
      chart: ./charts/anarchy
      sourceRef:
        kind: GitRepository
        name: anarchy
        namespace: flux-system
  valuesFrom:
    - kind: ConfigMap
      name: anarchy-values
      valuesKey: values.yaml
